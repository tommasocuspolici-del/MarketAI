# Pre-commit hooks — run BEFORE every commit
# Install once:  poetry run pre-commit install
# Run on all:    poetry run pre-commit run --all-files
repos:
  # ─── Generic hygiene ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key

  # ─── Python linter + formatter ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ─── Type checking ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ["--strict", "--ignore-missing-imports"]
        additional_dependencies:
          - pydantic>=2.7
          - types-PyYAML
        files: ^(shared|engine|personal|bridge)/
        exclude: ^tests/

  # ─── Security ───────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-ll", "--skip", "B101"]
        files: ^(shared|engine|personal|bridge)/
        exclude: ^tests/

  # ─── Conventional Commits (Rule 17) ─────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ["feat", "fix", "refactor", "docs", "test", "perf", "chore"]
