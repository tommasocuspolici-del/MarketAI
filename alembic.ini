# Alembic configuration for Market Analysis AI — SQLite (OLTP)
[alembic]
script_location = shared/db/migrations/sqlite
prepend_sys_path = .
version_path_separator = os
# URL risolto dinamicamente da env.py via shared.constants.SQLITE_PATH
sqlalchemy.url = sqlite:///db/personal.sqlite

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
