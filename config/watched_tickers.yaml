# ============================================================================
# Watched tickers — universo dei tickers monitorati dallo scheduler (v7.1.1)
# ============================================================================
# Aggiungere ticker QUI: il codice del fetcher non va piu' modificato.
# Categorie organizzate per uso (Macro, equity, futures, FX, crypto, ...).
# Roadmap unificata: Settimana 0 — Fondazione.
# ============================================================================

equity_indices:
  - { ticker: "SPY",    exchange: "NYSE",   label: "S&P 500 ETF" }
  - { ticker: "QQQ",    exchange: "NYSE",   label: "NASDAQ ETF" }
  - { ticker: "IWM",    exchange: "NYSE",   label: "Russell 2000 ETF" }
  - { ticker: "VGK",    exchange: "NYSE",   label: "Europe ETF" }
  - { ticker: "EEM",    exchange: "NYSE",   label: "Emerging Markets ETF" }

