# ═══════════════════════════════════════════════════════════════════════════
# FEATURE FLAGS — Regola 29
# ═══════════════════════════════════════════════════════════════════════════
# Tutte le funzionalità sperimentali o costose sono gestite qui.
# Default sicuro = false. Abilitare esplicitamente solo quando necessario.
#
# Uso nel codice:
#   from shared.feature_flags import is_enabled, require_enabled
#   if is_enabled("realtime_websocket"):
#       ...
#   require_enabled("pytorch_forecasting")  # lancia FeatureDisabledError se off
# ═══════════════════════════════════════════════════════════════════════════

# ─── Fonti dati costose ──────────────────────────────────────────────────
edgar_bulk_download: true          # ROADMAP v3.0 Sett.1: abilitato — richiede SEC_EDGAR_USER_AGENT in .env
realtime_websocket: true           # ROADMAP v3.0 Sett.2: abilitato — richiede FINNHUB_API_KEY in .env
alpha_vantage_premium: true        # ROADMAP v3.0 Sett.1: abilitato — richiede ALPHA_VANTAGE_KEY premium in .env

# ─── Modelli costosi in RAM/CPU ──────────────────────────────────────────
pytorch_forecasting: false         # Modelli DL: richiedono GPU/molta RAM
prophet_forecasting: true          # Prophet: leggero, può essere attivo
arima_auto: true                   # pmdarima auto ARIMA: moderato
hmm_regime_detection: true         # HMM: leggero, regime labelling

# ─── Analisi avanzata ────────────────────────────────────────────────────
advanced_correlation: true         # DCC-GARCH + HMM
granger_causality: true            # Test di causalità tra asset
stress_forward_looking: true       # Scenari sintetici forward-looking (Regola 24)

# ─── LLM ─────────────────────────────────────────────────────────────────
ollama_narrative: false            # LLM locale: richiede Ollama installato

# ─── Personal Layer ──────────────────────────────────────────────────────
personal_tax_report: true          # Calcolo fiscale IT
personal_etoro_import: true        # Import XLSX eToro
auto_rebalancing_alerts: true      # Alert ribilanciamento portafoglio
wealth_monte_carlo: true           # Simulazione Monte Carlo patrimonio
retirement_simulator: true         # Simulatore FIRE/pensione

# ─── Notifiche & Alert ───────────────────────────────────────────────────
desktop_notifications: true        # plyer: notifiche desktop nativo
alert_deduplication: true          # Dedup alert per N ore

# ─── Operazioni ──────────────────────────────────────────────────────────
auto_backup_daily: true            # Backup giornaliero automatico ore 02:00
auto_retention_cleanup: true       # Pulizia dati oltre retention mensile
health_monitoring: true            # HealthChecker attivo

# ─── Sperimentale (NON abilitare in produzione) ──────────────────────────
experimental_pytorch_lstm: false
experimental_graph_embeddings: false

# ══════════════════════════════════════════════════════════════════════════
# ROADMAP UNIFICATA v1.0 — Flag aggiuntivi (Settimana 0, Giorno 2)
# ══════════════════════════════════════════════════════════════════════════

# ─── Scheduler jobs ──────────────────────────────────────────────────────
market_data_refresh: true             # Job prezzi ogni 4h lun-ven
analysis_pipeline_scheduled: true     # Job pipeline ogni 4h (dopo dati)
sentiment_refresh_hourly: false       # Sentiment orario (costoso)

# ─── Alpha Generation — Modulo VIX ───────────────────────────────────────
vix_based_analysis: true              # VixSignalCalculator + StrategyComposer
vix_vxv_ratio: true                   # Ratio VIX/VXV per term structure
vix_futures_term_structure: false     # Richiede API futures dedicata

# ─── Engine improvements — Migliorie attive ───────────────────────────────
futures_analysis: true                # Miglioria #1: CL=F, GC=F via yfinance
claims_inflation_cross: true          # Miglioria #2: ICSA + CPIAUCSL
hy_credit_spread: true                # Miglioria #6: BAMLH0A0HYM2
earnings_calendar: false              # Miglioria #5: Finnhub (costoso)
cot_data: false                       # Miglioria #7: parser custom (fase 3)
breadth_indicators: false             # Miglioria #8: 500 ticker (fase 3)
regime_conditional_sizing: true       # HMM regime → VIX thresholds
carry_trade_monitor: false            # Miglioria #10: fase 3

# ─── Analytics avanzati — Fase 3 (disabilitati per default) ──────────────
gdpnow_feed: false                    # Miglioria #20: Atlanta Fed JSON
alpha_decay_monitor: false            # Miglioria #23: fase 3
factor_model: false                   # Miglioria #17: Fama-French fase 3

# ══════════════════════════════════════════════════════════════════════════
# HIGH-IMPACT LOW-COMPLEXITY MODULES (da 2_HIGH_IMPACT_MODULES.md)
# ══════════════════════════════════════════════════════════════════════════

# ─── High-Impact Low-Complexity ──────────────────────────────────────────
volume_analysis: true              # OBV, CMF, VWAP, Amihud
divergence_detection: true         # RSI/MACD divergenze
cvar_fat_tail: true                # CVaR con t-Student
risk_contribution: true            # Risk contribution per asset
vol_surface_full: true             # VIX9D, VIX3M, VIX6M, SKEW
real_yield_analysis: true          # Real yield → oro → equity
tail_hedge_analysis: true          # Correlazione hedge in stress

# ─── Rebalancing Engine ──────────────────────────────────────────────────
rebalancing_engine: true           # Engine attivo
rebalancing_method: "hrp"          # 'markowitz'|'hrp'|'risk_parity'|'equal_weight'
rebalancing_tax_aware: true        # Considera l'impatto fiscale IT
rebalancing_min_trade_eur: 50.0    # Non suggerire trade < 50 EUR
rebalancing_threshold_pct: 5.0     # Ribilancia solo se drift > 5% dal target

# ─── Blocco B — Labour Market (Roadmap Analisi/Previsione v1.0) ──────────
labour_market_forecasting: true     # JOLTSAnalyzer + LabourForecastEngine
labour_market_scheduler: true       # Job scheduler giovedì 17:00

# ─── Blocco C — Economic Surprise (Roadmap Analisi/Previsione v1.0) ──────
economic_surprise_engine: true      # SurpriseCalculator + Aggregator
surprise_consensus_loader: true     # ROADMAP v3.0 Sett.6: ConsensusLoader abilitato
surprise_scheduler: true            # ROADMAP v3.0 Sett.6: job surprise lunedì 08:00 UTC

# ─── Blocco A — Fondamentali (Roadmap v3.0 Settimana 1) ──────────────────────
edgar_fundamentals_scheduler: true    # Job edgar_fundamentals domenica 06:00 UTC
av_fundamentals_scheduler: true       # Job av_fundamentals lunedì 07:30 UTC
fundamentals_ui_k2: true              # Mostra sezione fondamentali in K2_Equity

# ─── Blocco A — Data Quality avanzata (Roadmap v3.0 Settimana 2) ─────────────
data_quality_alerting: true        # DataQualityAlerter: alert automatici su score basso
cross_source_validation: true      # CrossSourceValidator: confronto yfinance vs AV

# ══════════════════════════════════════════════════════════════════════════
# ROADMAP ANALISI MERCATO v4.0 — Flag aggiuntivi (v8.2/v8.3)
# ══════════════════════════════════════════════════════════════════════════

# ─── Blocco 1: Labour Market Fetchers ────────────────────────────────────
labour_market_fetcher: true        # JOLTSFetcher + ClaimsFetcher + PayrollFetcher (FRED)
labour_beveridge_analysis: true    # Beveridge gap calcolato automaticamente

# ─── Blocco 3: Valuation Engine ──────────────────────────────────────────
valuation_pe_engine: true          # PECalculator + PEContextBuilder + ValuationSignalGenerator
shiller_cape_fetcher: true         # Download dataset Shiller Yale (1 req/giorno)
forward_pe_estimates: true         # Forward EPS da Alpha Vantage / YAML fallback
valuation_sector_pe: false         # PE settoriale (richiede dati aggiuntivi)

# ─── Blocco 4: Correlation Engine v2 ─────────────────────────────────────
dcc_ewma_enhanced: true            # EWMA enhanced con decay ottimale MLE (sempre attivo)
dcc_garch_full: false              # DCC-GARCH(1,1) via arch library (default OFF: costoso)
lead_lag_granger: true             # Granger causality test su 10 coppie chiave
cross_asset_matrix: true           # Matrice 13 asset × 4 regimi
correlation_signal_composite: true # Segnale correlazioni → Composite Signal v2

# ─── Blocco 2: Composite Signal v2 ───────────────────────────────────────
composite_signal_v2: true          # Aggregatore 7 componenti (labour/valuation/surprise)
surprise_consensus_scraping: false # Scraping Investing.com (default OFF: fragile)

# ══════════════════════════════════════════════════════════════════════════
# ROADMAP v5.0 — Signal Bus + QC Layer (Blocco B)
# ══════════════════════════════════════════════════════════════════════════

# ─── Blocco B — Signal Bus (Lean) ────────────────────────────────────────
signal_bus_enabled: true               # SignalBus pub/sub in-process
signal_persistence_duckdb: false       # Persist signal_snapshots to DuckDB (costly)
signal_dag_enabled: false              # Signal dependency DAG (advanced — off by default)
composite_signal_v3: false             # CompositeSignalAggregatorV3 (off until C ready)

# ─── QC Layer ─────────────────────────────────────────────────────────────
alpha_decay_monitor: true              # AlphaDecayMonitor enabled (was false in v4)
consensus_validator: true              # ConsensusValidator before BUY/SELL alerts
regime_aware_weighting: true           # Regime-adaptive weights from regime_weights.yaml
sentiment_finbert: false               # FinBERT sentiment scorer (enabled in Blocco A)

# ══════════════════════════════════════════════════════════════════════════
# ROADMAP v5.0 — Custom Indicators Framework (Blocco C)
# ══════════════════════════════════════════════════════════════════════════

# ─── Blocco C — Core ─────────────────────────────────────────────────────
custom_indicators_enabled: true        # CustomIndicatorRegistry + pre-built library
custom_indicator_dsl: true             # DSL expression evaluator (sandboxed)
custom_indicator_optuna: false         # Optuna-based auto-calibration (heavy — off)
custom_indicator_scheduler: true       # Refresh job every 30 min on business days
composite_signal_v3: true              # CompositeSignalAggregatorV3 now active (Blocco C)
