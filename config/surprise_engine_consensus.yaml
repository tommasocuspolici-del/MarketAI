# =============================================================================
# surprise_engine_consensus.yaml — Stime Consensus Manuali
# Roadmap v3.0 — Settimana 6: ConsensusLoader source 'yaml_manual'
#
# Come usarlo:
#   Aggiungi le stime degli analisti prima di ogni rilascio dati.
#   ConsensusLoader.load_yaml() carica questo file e lo persiste
#   in consensus_estimates DuckDB con source='yaml_manual'.
#
# Formato:
#   code:       codice indicatore (deve corrispondere a surprise_engine.yaml)
#   date:       data rilascio YYYY-MM-DD
#   consensus:  stima mediana analisti (stessa unità del FRED actual)
#
# Fonti utili per consensus:
#   · Trading Economics: https://tradingeconomics.com/calendar
#   · Investing.com Economic Calendar
#   · Bloomberg Economic Calendar (paywall)
# =============================================================================

estimates:
