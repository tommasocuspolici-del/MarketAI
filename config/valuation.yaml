# Valuation Engine — configurazione PE / CAPE / ERP
# Blocco 3 — ROADMAP_ANALISI_MERCATO_v4

shiller_cape:
  primary_url: "https://www.multpl.com/shiller-pe/table/by-year"
  yale_xls_url: "http://www.econ.yale.edu/~shiller/data/ie_data.xls"
  fred_series: "CAPE"
  cache_ttl_hours: 24
  history_years: 20

pe_calculator:
  ticker: "^GSPC"
  forward_pe_source: "yfinance"    # yfinance | manual | fred
  history_years: 20
  min_history_years: 5             # minimo per z-score affidabile

valuation_signal:
  # Pesi per composite valuation score [-1, +1]
  weights:
    trailing_pe:  0.30
    forward_pe:   0.35
    cape:         0.25
    erp:          0.10
  # Soglie z-score per label
  thresholds:
    extremely_expensive:  2.0
    expensive:            1.0
    fair_value:           0.0   # [-1, +1]
    cheap:               -1.0
    extremely_cheap:     -2.0

erp:
  risk_free_rate_source: "yield_curve"  # usa TY10 da yield_curve_snapshots
  equity_risk_premium_target: 0.03      # 3% ERP target storico
