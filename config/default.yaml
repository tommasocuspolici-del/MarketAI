# ═══════════════════════════════════════════════════════════════════════════
# DEFAULT CONFIGURATION — caricato da shared/constants.py
# ═══════════════════════════════════════════════════════════════════════════
# Valori globali dell'applicazione. Sovrascrivibili via env o config specifici.
# ═══════════════════════════════════════════════════════════════════════════

application:
  name: "Market Analysis AI"
  version: "6.0.0"
  base_currency: "EUR"
  timezone: "Europe/Rome"

# ─── Data Quality thresholds (Regola 26) ─────────────────────────────────
data_quality:
  min_score_for_critical_calc: 0.5
  min_score_for_backtest: 0.7
  warn_threshold_gaps_pct: 5.0
  warn_threshold_outliers_pct: 2.0
  stale_days_threshold: 5

# ─── Latency targets (Regola 25) ─────────────────────────────────────────
latency:
  realtime_max_seconds: 60
  query_p95_seconds: 2.0
  pipeline_max_seconds: 10

# ─── Error Budget (Regola 30) ────────────────────────────────────────────
error_budget:
  window_minutes: 5
  max_error_rate_pct: 10.0
  scheduler_uptime_target_pct: 99.0
  auto_suspend_on_breach: true

# ─── Cache ───────────────────────────────────────────────────────────────
cache:
  path: "data/cache"
  size_limit_mb: 1024
  default_ttl_seconds: 900       # 15 minuti default
  price_ttl_seconds: 60          # prezzi: refresh ogni minuto
  macro_ttl_seconds: 3600        # macro: refresh orario
  fundamentals_ttl_seconds: 86400  # fondamentali: refresh giornaliero

# ─── Backtesting defaults ────────────────────────────────────────────────
backtesting:
  default_fees: 0.001            # 10 bps minimo (Regola Anti-pattern)
  default_slippage: 0.001        # 10 bps minimo
  walk_forward_splits: 5
  min_quality_score: 0.7         # Rifiuta serie con qualità < 0.7

# ─── Stress Testing defaults ─────────────────────────────────────────────
stress_testing:
  historical_scenarios_min: 4
  forward_looking_scenarios_min: 5

# ─── Sentiment ───────────────────────────────────────────────────────────
sentiment:
  min_sources: 3                 # Regola Anti-pattern: min 3 fonti indipendenti
  extreme_greed_threshold: 80
  extreme_fear_threshold: 20

# ─── Portfolio / Personal ────────────────────────────────────────────────
personal:
  monte_carlo_simulations: 10000
  default_inflation_rate: 0.025  # 2.5% media storica

# ─── UI ──────────────────────────────────────────────────────────────────
ui:
  refresh_interval_ms: 30000     # 30s auto-refresh
  max_page_load_seconds: 3
